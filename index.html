<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow: hidden;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

.button-row {
  display: flex;
  gap: 100px;
  margin-top: 20px;
  position: relative;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background-color: #4CAF50;
  color: white;
}

.no {
  background-color: #f44336;
  color: white;
}

img {
  width: 22vw; /* responsive width */
  height: 22vw; /* keeps it square */
  max-width: 160px; /* prevents too big on large screens */
  max-height: 160px;
  min-width: 80px; /* prevents too small on tiny screens */
  min-height: 80px;
  object-fit: cover;
  border-radius: 20px;
  position: absolute;
  animation: float 4s ease-in-out infinite;
}

/* Vertical images for side photos */


/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

.message {
  max-width: 80%;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>
<body>

<!-- Sound effect -->
<audio id="jumpSound" src="jump.mp3"></audio>

<!-- Screen 1 -->
