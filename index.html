<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow: hidden;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

.button-row {
  display: flex;
  gap: 100px;
  margin-top: 20px;
  position: relative;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background-color: #4CAF50;
  color: white;
}

.no {
  background-color: #f44336;
  color: white;
}

img {
  width: 22vw; /* responsive width */
  height: 22vw; /* keeps it square */
  max-width: 160px; /* prevents too big on large screens */
  max-height: 160px;
  min-width: 80px; /* prevents too small on tiny screens */
  min-height: 80px;
  object-fit: cover;
  border-radius: 20px;
  position: absolute;
  animation: float 4s ease-in-out infinite;
}

/* Vertical images for side photos */


/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

.message {
  max-width: 80%;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>
<body>

<!-- Sound effect -->
<audio id="jumpSound" src="jump.mp3"></audio>

<!-- Screen 1 -->
<div id="screen1" class="screen active">
  <h1>Do you love me? ❤️</h1>
  <div class="button-row">
    <button class="yes" onclick="nextScreen(2)">Yes</button>
    <button onclick="noLove()">No</button>
  </div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
  <h1>Will you spend eternity with me? 💍</h1>
  <div class="button-row" id="btnContainer">
    <button class="yes" onclick="nextScreen(3)">Yes</button>
    <button id="noBtn" class="no">No</button>
  </div>
</div>

<!-- Screen 3 -->
<div id="screen3" class="screen">
  <div class="message">
    I dont know what you have done for other people but you have given me memories of a lifetime in this past year, more than you realise, I will be lovin more and more day by day. Heres to eternity🫶🏼🧿💕. 
  <!-- 6 Images positioned at edges -->
  <img src="photo1.jpeg" style="top:0; left:0;">
  <img src="photo2.jpeg" style="top:0; right:0;">
  <img src="photo3.jpeg" style="bottom:0; left:0;">
  <img src="photo4.jpeg" style="bottom:0; right:0;">
  <img src="photo5.jpeg" style="top:50%; left:50%; transform: translate(-50%, -50%);">
  <img src="photo6.jpeg" style="top:65%; left:50%; transform: translate(-50%, -50%);">
</div>

<script>
function nextScreen(screenNumber) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + screenNumber).classList.add('active');
}

function noLove() {
  alert("You do love me, you just dont know it yet ❤️");
  nextScreen(2);
}

const noBtn = document.getElementById('noBtn');
const jumpSound = document.getElementById('jumpSound');

noBtn.addEventListener('mouseover', moveButton);
noBtn.addEventListener('click', moveButton);

function moveButton() {
  noBtn.style.position = 'absolute';

  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';

  // Play sound
  jumpSound.currentTime = 0;
  jumpSound.play();
}
</script>

</body>
</html>
