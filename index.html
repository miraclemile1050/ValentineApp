<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow: hidden;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

.button-row {
  display: flex;
  gap: 100px;
  margin-top: 20px;
  justify-content: center;
  align-items: center;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background-color: #4CAF50;
  color: white;
}

.no {
  background-color: #f44336;
  color: white;
  position: relative;
  z-index: 10;
}

img {
  width: 28vw;
  height: 28vw;
  max-width: 200px;
  max-height: 200px;
  min-width: 100px;
  min-height: 100px;
  object-fit: cover;
  border-radius: 20px;
  position: absolute;
}

.message {
  max-width: 80%;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>
<body>

<!-- Screen 1 -->
<div id="screen1" class="screen active">
  <h1>Do you love me? ❤️</h1>
  <div class="button-row">
    <button class="yes" onclick="nextScreen(2)">Yes</button>
    <button onclick="noLove()">No</button>
  </div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
  <h1>Will you spend eternity with me? 💍</h1>
  <div class="button-row">
    <button class="yes" onclick="nextScreen(3)">Yes</button>
    <button id="noBtn" class="no">No</button>
  </div>
</div>

<!-- Screen 3 -->
<div id="screen3" class="screen">
  <div class="message">
    I dont know what you have done for other people but you have given me memories of a lifetime in this past year, more than you realise, I will be lovin more and more day by day. Heres to eternity🫶🏼🧿💕.
  </div>

  <img src="photo1.jpeg" style="top:8%; left:8%;">
  <img src="photo2.jpeg" style="top:8%; right:8%;">
  <img src="photo3.jpeg" style="bottom:8%; left:8%;">
  <img src="photo4.jpeg" style="bottom:8%; right:8%;">
</div>

<script>
function nextScreen(screenNumber) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + screenNumber).classList.add('active');
}

function noLove() {
  alert("You do love me, you just dont know it yet ❤️");
  nextScreen(2);
}

const noBtn = document.getElementById('noBtn');

// Fix: ensure button starts visible
noBtn.style.position = 'relative';

noBtn.addEventListener('mouseenter', moveButton);
noBtn.addEventListener('touchstart', moveButton);

function moveButton(e) {
  e.preventDefault();

  noBtn.style.position = 'fixed';

  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;

  const maxX = window.innerWidth - btnWidth - 10;
  const maxY = window.innerHeight - btnHeight - 10;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
}
</script>

</body>
</html>
